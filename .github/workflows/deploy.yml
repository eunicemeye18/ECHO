name: Deploy ECHO WORK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── BUILD & DEPLOY WEB (GitHub Pages) ───────────────────────────────────────
  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/ECHO/" --no-wasm-dry-run

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── BUILD ANDROID APK ───────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-work-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create/Update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ECHO WORK — Latest Build"
          body: |
            ## ECHO WORK Android APK

            Téléchargez et installez l'APK sur votre appareil Android.

            > ⚠️ Activez "Sources inconnues" dans les paramètres Android avant l'installation.

            **Web App :** https://eunicemeye18.github.io/ECHO/
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── DEPLOY BACKEND (Render via Deploy Hook) ─────────────────────────────────
  deploy-backend:
    name: Deploy AI Backend
    runs-on: ubuntu-latest
    # Ne tourne que si le backend a changé OU si c'est un déclenchement manuel
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits.*.modified), 'backend/') ||
      contains(toJson(github.event.commits.*.added), 'backend/')

    steps:
      - name: Trigger Render Deploy Hook
        # RENDER_DEPLOY_HOOK_URL doit être ajouté dans GitHub Secrets
        # Settings → Secrets → RENDER_DEPLOY_HOOK_URL
        # Valeur : l'URL du deploy hook Render (ex: https://api.render.com/deploy/srv-xxx?key=yyy)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render deploy triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL not set — skipping backend deploy"
            echo "    Add it in: GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK_URL"
          fi
