name: Deploy ECHO WORK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── BUILD & DEPLOY WEB (GitHub Pages) ───────────────────────────────────────
  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/ECHO/" --no-wasm-dry-run

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── BUILD ANDROID APK ───────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-work-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create/Update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ECHO WORK — Latest Build"
          body: |
            ## ECHO WORK Android APK

            Téléchargez et installez l'APK sur votre appareil Android.

            > ⚠️ Activez "Sources inconnues" dans les paramètres Android avant l'installation.

            **Web App :** https://eunicemeye18.github.io/ECHO/
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── DEPLOY AI BACKEND (Vercel) ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy AI Backend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
        # Si les secrets Vercel ne sont pas configurés, ce job échoue silencieusement
        continue-on-error: true
