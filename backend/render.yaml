services:
  - type: web
    name: echo-work-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # à renseigner manuellement dans le dashboard Render
    healthCheckPath: /health
